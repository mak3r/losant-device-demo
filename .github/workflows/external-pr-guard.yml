name: External PR Guard

on:
  pull_request_target:
    types: [opened, reopened]

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - name: Reject external contributors
        if: github.event.pull_request.user.login != 'mak3r'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: 'Thank you for your interest. This repository currently only accepts contributions from the project maintainer. This PR has been closed automatically.'
            });
            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              state: 'closed'
            });
