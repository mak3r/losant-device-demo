name: External Issue Guard

on:
  issues:
    types: [opened]

permissions:
  issues: write
  contents: read

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - name: Reject external contributors
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const login = context.payload.issue.user.login;

            let isCollaborator = false;
            try {
              await github.rest.repos.checkCollaborator({ owner, repo, username: login });
              isCollaborator = true;
            } catch (_) {}

            if (isCollaborator) return;

            const issueNumber = context.payload.issue.number;

            await github.rest.issues.createComment({
              owner, repo,
              issue_number: issueNumber,
              body: 'Thank you for your interest. This repository currently only accepts contributions from the project maintainer. This issue has been closed automatically.'
            });

            await github.rest.issues.update({
              owner, repo,
              issue_number: issueNumber,
              state: 'closed'
            });

            await github.rest.issues.lock({
              owner, repo,
              issue_number: issueNumber,
              lock_reason: 'spam'
            });
